name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            name: macabre-darwin-arm64
          - target: x86_64-apple-darwin
            name: macabre-darwin-amd64

    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz macabre

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute sha256 hashes
        id: hashes
        run: |
          echo "arm64=$(sha256sum artifacts/macabre-darwin-arm64/macabre-darwin-arm64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "amd64=$(sha256sum artifacts/macabre-darwin-amd64/macabre-darwin-amd64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Generate Formula/macabre.rb
        run: |
          cat > Formula/macabre.rb << 'FORMULA'
          class Macabre < Formula
            desc "macOS hardening & security audit scanner"
            homepage "https://github.com/Sn0wAlice/macabre"
            version "${{ steps.version.outputs.version }}"
            license "MIT"

            depends_on :macos

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/Sn0wAlice/macabre/releases/download/v#{version}/macabre-darwin-arm64.tar.gz"
                sha256 "${{ steps.hashes.outputs.arm64 }}"
              else
                url "https://github.com/Sn0wAlice/macabre/releases/download/v#{version}/macabre-darwin-amd64.tar.gz"
                sha256 "${{ steps.hashes.outputs.amd64 }}"
              end
            end

            def install
              bin.install "macabre"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/macabre --version")
            end
          end
          FORMULA
          sed -i 's/^          //' Formula/macabre.rb

      - name: Push updated formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/macabre.rb
          git commit -m "chore: update Homebrew formula to v${{ steps.version.outputs.version }}" || echo "no formula changes"
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/macabre-darwin-arm64/*.tar.gz
            artifacts/macabre-darwin-amd64/*.tar.gz
